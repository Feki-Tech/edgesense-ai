name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.30"
          enable-cache: true
      - run: uv sync --all-extras # base + every service extra + dev group
      - run: uv run pytest

  go:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [edge-agent, coap-receiver]
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: ${{ matrix.module }}/go.sum
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...
