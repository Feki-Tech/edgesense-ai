services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: edgesense-mosquitto
    ports:
      - "11883:1883"
    volumes:
      - ./deploy/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped

  # Stands in for a remote/cloud broker reached over a flaky uplink (LTE, sat).
  # Stop it (make demo-offline) to watch the agent buffer events and replay
  # them on reconnect.
  mosquitto-cloud:
    image: eclipse-mosquitto:2
    container_name: edgesense-mosquitto-cloud
    ports:
      - "12883:1883"
    volumes:
      - ./deploy/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped

  inference:
    build:
      context: .
      dockerfile: inference/Dockerfile
    container_name: edgesense-inference
    ports:
      - "8800:8800"
    restart: unless-stopped

  agent:
    build: ./edge-agent
    container_name: edgesense-agent
    environment:
      EDGESENSE_BROKER: tcp://mosquitto:1883
      EDGESENSE_UPLINK_BROKER: tcp://mosquitto-cloud:1883
      EDGESENSE_INFERENCE_URL: http://inference:8800/score
      EDGESENSE_BUFFER: /data/event-buffer.jsonl
      EDGESENSE_METRICS_ADDR: ":8890"
    ports:
      - "8890:8890"
    volumes:
      - agent-data:/data
    depends_on:
      mosquitto:
        condition: service_started
      mosquitto-cloud:
        condition: service_started
      inference:
        condition: service_healthy
    restart: unless-stopped

  simulator:
    build: ./simulator
    container_name: edgesense-simulator
    # scale the virtual fleet: EDGESENSE_MACHINES=10 docker compose up -d simulator
    command: ["--broker", "mosquitto", "--port", "1883", "--machines", "${EDGESENSE_MACHINES:-3}"]
    depends_on:
      - mosquitto
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    container_name: edgesense-dashboard
    ports:
      - "8501:8501"
    environment:
      EDGESENSE_BROKER_HOST: mosquitto
      EDGESENSE_BROKER_PORT: "1883"
      EDGESENSE_UPLINK_HOST: mosquitto-cloud
      EDGESENSE_UPLINK_PORT: "1883"
    depends_on:
      - mosquitto
      - mosquitto-cloud
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: edgesense-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - agent
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    container_name: edgesense-grafana
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/edgesense.json
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  agent-data:
