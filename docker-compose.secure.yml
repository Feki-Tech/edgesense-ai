# Opt-in overlay: tenant-namespaced topics + authenticated uplink broker
# (PLATFORM.md §4.2/§4.4, phase 1). The local sensor broker stays anonymous;
# only the cloud/uplink broker requires credentials.
#
#   docker compose -f docker-compose.yml -f docker-compose.secure.yml up -d --build
#   (or: make stack-secure)
#
# Credentials are the demo set from deploy/secure/passwd, generated by
# scripts/gen_broker_auth.py — demo-only, regenerate for anything real.
services:
  mosquitto-cloud:
    volumes:
      - ./deploy/secure/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./deploy/secure/passwd:/mosquitto/config/passwd:ro
      - ./deploy/secure/acl:/mosquitto/config/acl:ro

  agent:
    environment:
      EDGESENSE_ORG: default
      EDGESENSE_SITE: default
      # site-gateway credential: may publish es/default/default/+/events
      EDGESENSE_UPLINK_USERNAME: gw@default/default
      EDGESENSE_UPLINK_PASSWORD: gateway-demo-pw

  simulator:
    command: ["--broker", "mosquitto", "--port", "1883",
              "--machines", "${EDGESENSE_MACHINES:-3}",
              "--org", "default", "--site", "default"]

  dashboard:
    environment:
      EDGESENSE_ORG: default
      EDGESENSE_SITE: default
      EDGESENSE_UPLINK_USERNAME: ops
      EDGESENSE_UPLINK_PASSWORD: ops-demo-pw
