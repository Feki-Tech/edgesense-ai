# Azure ML command job: the continuous-training (CT) unit of work.
# Runs the repo's own chain — train -> evaluate -> champion/challenger gate ->
# register in MLflow. Submitted on demand by the retrain workflow (or manually:
#   az ml job create -f retrain_job.yml -w edgesense-mlw -g edgesense-rg )
#
# Runs on the scale-to-zero AmlCompute cluster (see `compute:` below): you pay
# only for the minutes a node is up, and it deallocates when idle.
$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
display_name: edgesense-drift-retrain
experiment_name: edgesense-continuous-training
description: >
  Drift-triggered retraining: train a challenger on fresh healthy data,
  run the champion/challenger promotion gate, and register the winner
  as champion or park it as challenger (role tags) in the MLflow registry.

code: ../..   # repo root (this file lives at edgesense-azure/ml/ inside the repo)

# promote.py trains the challenger, replays the offline evaluation harness on
# challenger + current champion, and exits 0 (promoted -> ml/model is the new
# champion), 1 (refused -> candidate parked in --out-dir), or 2 (error).
# (The gate's ONNX parity check is portable across onnxruntime versions because
# ml/export_onnx.py pins the model IR version — no onnxruntime pin needed here.)
command: >-
  pip install -r requirements-dev.txt "mlflow<3" azureml-mlflow &&
  rc=0; python ml/promote.py --out-dir ml/model/candidate || rc=$?;
  if [ "$rc" -eq 0 ]; then
    python ml/register_model.py --bundle ml/model --promote;
  elif [ "$rc" -eq 1 ]; then
    python ml/register_model.py --bundle ml/model/candidate;
  else
    exit "$rc";
  fi

environment: azureml:AzureML-sklearn-1.5@latest

# Target the scale-to-zero AmlCompute cluster (infra/azureml.tf) instead of
# serverless: serverless quota is 0 on trial/free subs, whereas dedicated
# cluster cores are available. min_node_count = 0 keeps idle cost at zero.
compute: azureml:edgesense-cpu
