# Azure ML command job: the continuous-training (CT) unit of work.
# Runs the repo's own chain — train -> evaluate -> champion/challenger gate ->
# register in MLflow. Submitted on demand by the retrain workflow (or manually:
#   az ml job create -f retrain_job.yml -w edgesense-mlw -g edgesense-rg )
#
# Uses serverless compute: you pay only for the minutes the job runs.
$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
display_name: edgesense-drift-retrain
experiment_name: edgesense-continuous-training
description: >
  Drift-triggered retraining: train a challenger on fresh healthy data,
  run the champion/challenger promotion gate, and register the winner
  (champion alias) or park it (challenger alias) in the MLflow registry.

code: ../..   # repo root (this file lives at edgesense-azure/ml/ inside the repo)

command: >-
  pip install -r requirements.txt "mlflow<3" azureml-mlflow &&
  python ml/train.py &&
  python ml/evaluate.py &&
  if python ml/promote.py --candidate ml/model; then
    python ml/register_model.py --bundle ml/model --promote;
  else
    python ml/register_model.py --bundle ml/model;
  fi

environment: azureml:AzureML-sklearn-1.5@latest

resources:
  instance_type: Standard_E4s_v3
  instance_count: 1
