# Azure ML managed online deployment for the EdgeSense champion model.
# Uses a scoring script (score.py) over the registered bundle artifacts,
# reusing the repo's own hybrid scoring logic.
$schema: https://azuremlschemas.azureedge.net/latest/managedOnlineDeployment.schema.json
name: blue
endpoint_name: edgesense-anomaly-ep
# Azure ML has no MLflow alias support; deploy_endpoint.sh resolves the
# champion version from the model's 'champion_version' tag and overrides this.
model: azureml:edgesense-anomaly@latest
code_configuration:
  code: .
  scoring_script: score.py
environment:
  image: mcr.microsoft.com/azureml/openmpi4.1.0-ubuntu22.04:latest
  conda_file: environment.yml
instance_type: Standard_DS2_v2
instance_count: 1
