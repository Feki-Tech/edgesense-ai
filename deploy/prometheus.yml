global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: edgesense-agent
    static_configs:
      - targets: ["agent:8890"]

  # Inference sidecar: model info, score histogram and per-feature drift
  # gauges (see docs/MLOPS.md).
  - job_name: edgesense-inference
    static_configs:
      - targets: ["inference:8800"]

  # Only live when the stack runs with the CoAP uplink profile
  # (make stack-coap); otherwise the target simply reports down.
  - job_name: edgesense-coap-receiver
    static_configs:
      - targets: ["coap-receiver:8891"]
