listener 1883 0.0.0.0
allow_anonymous true
log_dest stdout

# Persist durable sessions + queued QoS1 messages across broker restarts
# (mosquitto saves the DB on SIGTERM). make demo-offline stops/starts the
# cloud broker: the agent's replayed events must queue for the demo's durable
# listener even while the listener's host-side TCP socket is still timing out
# (Docker Desktop's port proxy can delay connection-loss detection).
persistence true
persistence_location /mosquitto/data/
