# Provisioned alert rules (Grafana 11 file provisioning).
# Fires when any feature's PSI drift gauge stays above 0.2 for 10 minutes —
# the serving data distribution has moved away from what the model was
# trained on (see docs/MLOPS.md).
apiVersion: 1

groups:
  - orgId: 1
    name: edgesense-model
    folder: EdgeSense
    interval: 1m
    rules:
      - uid: edgesense-drift-psi
        title: Feature drift (PSI) above 0.2
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: edgesense-prom
            model:
              expr: edgesense_model_drift_psi
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              refId: C
              conditions:
                - evaluator: { type: gt, params: [0.2] }
        for: 10m
        noDataState: OK
        execErrState: KeepLast
        labels:
          severity: warning
        annotations:
          summary: >-
            Serving-side data drift: PSI of feature {{ $labels.feature }} has
            been above 0.2 for 10 minutes. The model may be scoring data it was
            not trained on — consider retraining via the promotion gate
            (make promote).
