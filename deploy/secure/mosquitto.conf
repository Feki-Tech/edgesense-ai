# Secured uplink broker (PLATFORM.md §4.2, phase 1).
# Opt-in: docker-compose.secure.yml swaps this in for the mosquitto-cloud
# service (`make stack-secure`). The local sensor broker stays anonymous.
#
# passwd + acl are generated by scripts/gen_broker_auth.py; the committed
# files hold demo-only credentials (see README "Secured uplink broker").
listener 1883 0.0.0.0
allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl
log_dest stdout

# Persist durable sessions + queued QoS1 messages across broker restarts —
# same rationale as deploy/mosquitto.conf (make demo-offline).
persistence true
persistence_location /mosquitto/data/

# Production (§4.2): terminate TLS on the uplink listener so passwords never
# cross the WAN in clear (server-side cert only in phase 1):
#   listener 8883 0.0.0.0
#   certfile /mosquitto/certs/server.crt
#   keyfile  /mosquitto/certs/server.key
#
# mosquitto warns that the bind-mounted passwd/acl files are world-readable
# and not owned by the mosquitto user — fine for the demo; chown/chmod them
# (0640 root:mosquitto) in real deployments.
